[changelog]
header = ""
body = """
{% if version == "v0.1.0" %}
Initial public release of `omp-impeccable`.

- Run Impeccable live mode from OMP without blocking the agent.
- Install and update the upstream Impeccable skill in `.agents/skills/impeccable`.
- Deliver browser events to the agent in the background.
- Show quiet live status while `/impeccable live` is running.
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | trim }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/jenkei/omp-impeccable/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
tag_pattern = "^v[0-9].*"
commit_parsers = [
  { message = "^feat(\\(.+\\))?:", group = "🚀 Features" },
  { message = "^fix(\\(.+\\))?:", group = "🐛 Bug Fixes" },
  { message = "^perf(\\(.+\\))?:", group = "⚡ Performance" },
  { message = "^refactor(\\(.+\\))?:", group = "🔧 Refactor" },
  { message = "^docs(\\(.+\\))?:", group = "📚 Documentation" },
  { message = "^test(\\(.+\\))?:", group = "🧪 Testing" },
  { message = "^build(\\(.+\\))?:", group = "📦 Build" },
  { message = "^ci(\\(.+\\))?:", group = "🔄 CI" },
  { message = "^Improve README", group = "📚 Documentation" },
  { message = "^Add ", group = "🚀 Features" },
  { message = "^chore(\\(.+\\))?:", skip = true },
  { message = "^Release v[0-9].*", skip = true },
  { message = "^Preparing to release", skip = true },
  { message = "^Initial slop$", skip = true },
  { message = ".*", group = "Changes" },
]
